<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Ferie Personale ATA - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "@supabase/supabase-js": "https://cdn.skypack.dev/@supabase/supabase-js@2.51.0"
        }
    }
    </script>
</head>
<body>
    <!-- Header Template -->
    <header class="app-header">
        <div class="header-content">
            <div class="school-info">
                <div class="school-logo">
                    <img src="img/ipsia_logo_blue.svg" alt="Logo IPSIA">
                </div>
                <div class="school-details">
                    <h1>I.P.S.I.A. "Ostilio Ricci" - Fermo</h1>
                    <h2>Istituto Professionale Statale per l'Industria e l'Artigianato</h2>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Form di login -->
            <div class="login-container" id="login-section">
                <div class="logo-container">
                    <h1>Gestione Ferie</h1>
                    <h2>Personale ATA</h2>
                </div>
            
            <div class="form-container">
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Nome Utente</label>
                        <input type="text" id="username" name="username" required autocomplete="username">
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                    </div>
                    
                    <div class="button-container">
                        <button type="submit" class="btn btn-primary" id="login-button">Accedi</button>
                    </div>
                    
                    <div id="error-message" class="error-message"></div>
                    <div id="loading-message" class="info-message" style="display: none;">Autenticazione in corso...</div>
                </form>
            </div>
        </div>
        </div>
    </main>
    
    <!-- Footer Template -->
    <footer class="app-footer">
        <div class="footer-content">
            <p>&copy; 2024 Sviluppatore Software: Alessandro Gaspari</p>
            <div class="developer-info">
                <p>Email: <a href="mailto:alessandro.gaspari@gmail.com">alessandro.gaspari@gmail.com</a></p>
                <p>Telefono: <a href="tel:+393395014889">339 501 4889</a></p>
                <p>LinkedIn: <a href="https://www.linkedin.com/in/gasparialessandro/" target="_blank">Alessandro Gaspari</a></p>
            </div>
        </div>
    </footer>
    
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
