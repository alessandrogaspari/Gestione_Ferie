<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Ferie Personale ATA - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Form di login -->
        <div class="login-container" id="login-section">
            <div class="logo-container">
                <h1>Gestione Ferie</h1>
                <h2>Personale ATA</h2>
            </div>
            
            <div class="form-container">
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Nome Utente</label>
                        <input type="text" id="username" name="username" required autocomplete="username">
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                    </div>
                    
                    <div class="button-container">
                        <button type="submit" class="btn btn-primary" id="login-button">Accedi</button>
                    </div>
                    
                    <div id="error-message" class="error-message"></div>
                    <div id="loading-message" class="info-message" style="display: none;">Autenticazione in corso...</div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
